<!doctype html>
<html lang="en">
  <head>
    <title>Hangman Game</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <main>
      <div class="card">
        <div class="card-body text-center">
          <div class="row mb-3">
            <div class="col">Guessed letters wrong: <span id="wrong-letters"></span></div>
          </div>

          <div class="row mb-3">
            <div class="col">
              <a href="index.html">
                <button class="rounded col-12 col-md-6 col-lg-6 m-2" id="reset-btn">Restart</button>
              </a>
            </div>
          </div>

          <div class="hangman-box mb-3 text-center">
            <img src="1.png" alt="Hangman" />
          </div>

          <!-- KEYBOARD -->
          <div class="keyboard">
            <div class="row g-2 mb-2 keyboard-row" id="row-1"></div>
            <div class="row g-2 mb-2 keyboard-row" id="row-2"></div>
            <div class="row g-2 mb-2 keyboard-row" id="row-3"></div>
            <div class="row g-2 keyboard-row justify-content-center" id="row-4"></div>
          </div>
        </div>
      </div>
    </main>

    <footer></footer>

    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
      integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
      crossorigin="anonymous"
    ></script>
    <script src="app.js"></script>
  </body>
</html>
